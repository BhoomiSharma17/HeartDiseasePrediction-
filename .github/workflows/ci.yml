name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, '3.10', 3.11]   

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          echo "No requirements.txt found"
        fi

    - name: Run tests
      run: |
        if [ -d "tests" ]; then
          pip install pytest
          pytest tests/ -v --tb=short
        else
          echo "No tests directory found, skipping tests"
        fi

    - name: Check code style
      run: |
        pip install flake8
        if [ -d "src" ] || [ -d "app" ]; then
          flake8 src/ app/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 src/ app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        else
          echo "No src/ or app/ directory found, skipping lint"
        fi

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: Run flake8
      run: |
        if [ -d "src" ] || [ -d "app" ]; then
          flake8 src/ app/ --count --exit-zero --max-line-length=127 --statistics
        else
          echo "No src/ or app/ directory found, skipping"
        fi

    - name: Check formatting with black
      run: |
        if [ -d "src" ] || [ -d "app" ]; then
          black --check src/ app/
        else
          echo "Skipping black check"
        fi
      continue-on-error: true

    - name: Check import sorting
      run: |
        if [ -d "src" ] || [ -d "app" ]; then
          isort --check-only src/ app/
        else
          echo "Skipping isort check"
        fi
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        fi

    - name: Create necessary directories
      run: |
        mkdir -p models data screenshots

    - name: Verify project structure
      run: |
        ls -la
        echo "Project structure verified"
